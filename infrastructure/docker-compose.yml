version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: calories
      POSTGRES_PASSWORD: calories
      POSTGRES_DB: calories
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calories -d calories"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      RUN_MIGRATIONS: "1"
      DATABASE_URL: postgresql+psycopg://calories:calories@postgres:5432/calories
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://calories:calories@postgres:5432/calories
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    depends_on:
      backend:
        condition: service_healthy

  meal_vision_service:
    build:
      context: ../ml_services/meal_vision_service
    ports:
      - "8100:8100"

volumes:
  pg_data:
