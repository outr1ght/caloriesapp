version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nutrition_app
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nutrition_app"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutrition_app
      APP_REDIS_URL: redis://redis:6379/0
      APP_S3_ENDPOINT_URL: http://minio:9000
      APP_S3_ACCESS_KEY_ID: minioadmin
      APP_S3_SECRET_ACCESS_KEY: minioadmin
      APP_S3_BUCKET: nutrition-assets
      APP_S3_USE_SSL: "false"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nutrition_app
      APP_REDIS_URL: redis://redis:6379/0
      APP_S3_ENDPOINT_URL: http://minio:9000
      APP_S3_ACCESS_KEY_ID: minioadmin
      APP_S3_SECRET_ACCESS_KEY: minioadmin
      APP_S3_BUCKET: nutrition-assets
      APP_S3_USE_SSL: "false"
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pg_data:
