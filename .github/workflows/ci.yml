name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate imports compile
        run: python -m compileall app
      - name: Run tests
        run: pytest -q

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Pub get
        run: flutter pub get
      - name: Generate l10n
        run: flutter gen-l10n
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t calories-backend:ci backend
      - name: Build meal vision image
        run: docker build -f ml_services/meal_vision_service/Dockerfile -t calories-meal-vision:ci ml_services/meal_vision_service
